{% extends "base.html" %}
{% block title %}Recipes & Stories{% endblock %}
{% block content %}
<div class="space-y-4"><h2 class="font-display text-3xl text-brand-700">Recipes & Stories</h2><form method="get" class="grid gap-3 rounded-2xl border border-emerald-100 bg-white p-4 shadow-soft md:grid-cols-12"><div class="md:col-span-3"><label class="mb-1 block text-sm font-semibold">Type</label><select name="type"><option value="">All</option><option value="recipe" {% if content_type == 'recipe' %}selected{% endif %}>Recipe</option><option value="story" {% if content_type == 'story' %}selected{% endif %}>Story</option></select></div><div class="md:col-span-7"><label class="mb-1 block text-sm font-semibold">Search</label><input type="search" name="q" value="{{ search_query }}"></div><div class="md:col-span-2 flex items-end"><button class="rounded-xl bg-brand-600 px-4 py-2 text-sm font-semibold text-white">Filter</button></div></form><div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">{% for post in posts %}<article class="rounded-2xl border border-emerald-100 bg-white p-4 shadow-soft"><h3 class="font-display text-xl">{{ post.title }}</h3><p class="text-sm text-slate-500">{{ post.get_content_type_display }}</p><p class="mt-2 text-sm text-slate-600">{{ post.summary }}</p><a href="{% url 'content_detail' post.slug %}" class="mt-3 inline-block rounded-lg border border-slate-300 px-3 py-1 text-sm">Read</a></article>{% empty %}<p class="col-span-full text-slate-500">No posts found.</p>{% endfor %}</div></div>
{% endblock %}
