{% extends "base.html" %}
{% block title %}Cây cảnh{% endblock %}
{% block content %}
<div class="space-y-5">
  <section class="rounded-3xl border border-emerald-100 bg-gradient-to-r from-brand-900 to-brand-600 p-6 text-white shadow-card">
    <h2 class="font-display text-3xl">Cây cảnh & Chậu</h2>
    <p class="text-white/90">Chậu cây cảnh nhỏ, cây cảnh đẹp và đất trồng chất lượng.</p>
  </section>
  <section class="rounded-2xl border border-emerald-100 bg-white p-4 shadow-soft">
    <form method="get" class="grid gap-3 md:grid-cols-12 md:items-end">
      <div class="md:col-span-6"><label class="mb-1 block text-sm font-semibold">Search</label><input type="search" name="q" value="{{ search_query }}" placeholder="Tìm cây cảnh, chậu hoặc đất trồng"></div>
      <div class="md:col-span-3"><label class="mb-1 block text-sm font-semibold">Category</label><select name="category"><option value="">All Categories</option>{% for category in categories %}<option value="{{ category.id }}" {% if request.GET.category == category.id|stringformat:"s" %}selected{% endif %}>{{ category.name }}</option>{% endfor %}</select></div>
      <div class="md:col-span-3 flex flex-wrap gap-2"><label class="flex items-center gap-2 text-sm"><input type="checkbox" name="organic" value="1" {% if organic_only %}checked{% endif %}>Organic</label><button class="rounded-xl bg-brand-600 px-4 py-2 text-sm font-semibold text-white">Search</button></div>
    </form>
  </section>
  {% include "partials/product_grid.html" %}
</div>
{% endblock %}
