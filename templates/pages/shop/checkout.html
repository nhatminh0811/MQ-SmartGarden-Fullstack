{% extends "base.html" %}
{% block title %}Checkout{% endblock %}
{% block content %}
<div class="mx-auto max-w-3xl rounded-2xl border border-emerald-100 bg-white p-6 shadow-card">
  <h2 class="font-display text-3xl text-brand-700">Checkout</h2>
  <p class="mt-2 text-sm text-slate-600">You will be redirected to secure hosted checkout to complete payment.</p>
  <form method="post" class="mt-4 space-y-4">{% csrf_token %}
    <div><label class="mb-1 block text-sm font-semibold">Address</label><input type="text" name="address" value="{{ default_address }}" required></div>
    <div><label class="mb-1 block text-sm font-semibold">Postcode</label><input type="text" name="postcode" value="{{ default_postcode }}" required></div>
    <div><label class="mb-1 block text-sm font-semibold">Delivery Note</label><textarea name="customer_note" rows="3"></textarea></div>
    <button class="rounded-xl bg-brand-600 px-5 py-2.5 font-semibold text-white">Continue to Payment</button>
  </form>
</div>
{% endblock %}
