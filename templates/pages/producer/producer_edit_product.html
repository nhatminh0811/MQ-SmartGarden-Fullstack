{% extends "base.html" %}
{% block title %}Chỉnh sửa Cây Cảnh{% endblock %}
{% block content %}
<div class="mx-auto max-w-3xl rounded-2xl border border-emerald-100 bg-white p-6 shadow-card"><h2 class="font-display text-3xl text-brand-700">Chỉnh sửa Cây Cảnh</h2><form method="post" enctype="multipart/form-data" class="mt-4 space-y-3">{% csrf_token %}{% for field in form %}<div><label class="mb-1 block text-sm font-semibold">{{ field.label }}</label>{{ field }}</div>{% endfor %}<button class="rounded-xl bg-brand-600 px-4 py-2 font-semibold text-white">Save</button></form></div>
{% endblock %}
